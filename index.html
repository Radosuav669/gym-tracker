<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Training Journal</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="container">
    <div id="login-box" class="card">
        <h2>Gym Tracker Login</h2>
        <div class="input-group">
            <label for="email">Email</label>
            <input type="email" id="email" placeholder="your@mail.com">
        </div>
        <div class="input-group">
            <label for="password">Password</label>
            <input type="password" id="password" placeholder="••••••••">
        </div>
        <button id="btn-login">Log in</button>
    </div>

    <div id="app-box" class="hidden">
        <h1 id="today-title">Workout</h1>
        <p id="week-info"></p>
        
        <div id="workout-container"></div>
        
        <button id="btn-logout">Logout</button>
    </div>
</div>

<div class="footer">Created by Radoslaw</div>

<script src="js/supabase-config.js" defer></script>
<script src="js/auth.js" defer></script>
<script src="js/workout.js" defer></script>
</body>
</html>
